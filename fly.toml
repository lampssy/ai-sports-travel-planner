app = "snowcast"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "uv run --no-dev --no-config python -m app.data.bootstrap_database --database-url \"$DATABASE_URL\""

[env]
  PORT = "8080"

[processes]
  web = "uv run --no-dev --no-config uvicorn app.main:app --host 0.0.0.0 --port 8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["web"]
