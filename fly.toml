app = "ai-sports-travel-planner"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_DB_PATH = "/data/planner.db"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "planner_data"
  destination = "/data"
