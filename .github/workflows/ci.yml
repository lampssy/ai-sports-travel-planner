name: CI

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: planner
          POSTGRES_PASSWORD: planner
          POSTGRES_DB: ai_sports_travel_planner_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U planner -d ai_sports_travel_planner_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://planner:planner@127.0.0.1:5432/ai_sports_travel_planner_test
      TEST_DATABASE_URL: postgresql://planner:planner@127.0.0.1:5432/ai_sports_travel_planner_test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev --no-config

      - name: Run Ruff lint
        run: uv run --no-config ruff check .

      - name: Run Ruff format check
        run: uv run --no-config ruff format --check .

      - name: Run tests
        run: uv run --no-config pytest
