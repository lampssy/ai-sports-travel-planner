name: Catalog Acquisition

on:
  workflow_dispatch:
    inputs:
      resorts:
        description: "Comma-separated resort ids. Leave empty to use country or all resorts."
        required: false
        type: string
      country:
        description: "Optional exact country filter from app/data/resorts.json."
        required: false
        type: string
      skip_llm:
        description: "Skip LLM extraction and run deterministic sources only."
        required: true
        default: true
        type: boolean
      skip_wikidata:
        description: "Skip Wikidata facts and same-run official/OSM ID discovery."
        required: true
        default: false
        type: boolean
      skip_osm:
        description: "Skip OSM relation fact extraction."
        required: true
        default: false
        type: boolean
      skip_dem:
        description: "Skip DEM elevation sanity checks."
        required: true
        default: false
        type: boolean
      skip_official_discovery:
        description: "Skip static official-site link discovery."
        required: true
        default: false
        type: boolean
      skip_llm_link_classification:
        description: "Skip LLM classification of discovered official links."
        required: true
        default: false
        type: boolean
      skip_bergfex:
        description: "Skip configured Bergfex public-page fallback extraction."
        required: true
        default: false
        type: boolean
      max_pages_per_resort:
        description: "Maximum official/provider pages to fetch per resort when LLM extraction is enabled."
        required: true
        default: "3"
        type: string
      create_pr:
        description: "Apply conservative safe proposals and create a draft PR when changes exist."
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  catalog-acquisition:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev --no-config

      - name: Validate checked-in catalog
        run: uv run --no-config python -m app.data.validate_resort_catalog

      - name: Build acquisition arguments
        id: args
        shell: bash
        env:
          INPUT_RESORTS: ${{ inputs.resorts }}
          INPUT_COUNTRY: ${{ inputs.country }}
          INPUT_SKIP_LLM: ${{ inputs.skip_llm }}
          INPUT_SKIP_WIKIDATA: ${{ inputs.skip_wikidata }}
          INPUT_SKIP_OSM: ${{ inputs.skip_osm }}
          INPUT_SKIP_DEM: ${{ inputs.skip_dem }}
          INPUT_SKIP_OFFICIAL_DISCOVERY: ${{ inputs.skip_official_discovery }}
          INPUT_SKIP_LLM_LINK_CLASSIFICATION: ${{ inputs.skip_llm_link_classification }}
          INPUT_SKIP_BERGFEX: ${{ inputs.skip_bergfex }}
          INPUT_MAX_PAGES_PER_RESORT: ${{ inputs.max_pages_per_resort }}
        run: |
          set -euo pipefail
          args=()
          if [ -n "$INPUT_RESORTS" ]; then
            IFS=',' read -ra resorts <<< "$INPUT_RESORTS"
            for resort in "${resorts[@]}"; do
              trimmed="$(echo "$resort" | xargs)"
              if [ -n "$trimmed" ]; then
                args+=(--resort "$trimmed")
              fi
            done
          fi
          if [ -n "$INPUT_COUNTRY" ]; then
            args+=(--country "$INPUT_COUNTRY")
          fi
          if [ "$INPUT_SKIP_LLM" = "true" ]; then
            args+=(--skip-llm)
          fi
          if [ "$INPUT_SKIP_WIKIDATA" = "true" ]; then
            args+=(--skip-wikidata)
          fi
          if [ "$INPUT_SKIP_OSM" = "true" ]; then
            args+=(--skip-osm)
          fi
          if [ "$INPUT_SKIP_DEM" = "true" ]; then
            args+=(--skip-dem)
          fi
          if [ "$INPUT_SKIP_OFFICIAL_DISCOVERY" = "true" ]; then
            args+=(--skip-official-discovery)
          fi
          if [ "$INPUT_SKIP_LLM_LINK_CLASSIFICATION" = "true" ]; then
            args+=(--skip-llm-link-classification)
          fi
          if [ "$INPUT_SKIP_BERGFEX" = "true" ]; then
            args+=(--skip-bergfex)
          fi
          args+=(--max-pages-per-resort "$INPUT_MAX_PAGES_PER_RESORT")
          printf 'args<<EOF\n' >> "$GITHUB_OUTPUT"
          printf '%q ' "${args[@]}" >> "$GITHUB_OUTPUT"
          printf '\nEOF\n' >> "$GITHUB_OUTPUT"

      - name: Run catalog acquisition
        id: acquisition
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        shell: bash
        run: |
          set +e
          uv run --no-config python -m app.data.resort_acquisition.run_catalog_acquisition \
            ${{ steps.args.outputs.args }} \
            --output-dir artifacts/catalog-acquisition
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Apply conservative catalog patch
        if: ${{ steps.acquisition.outputs.exit_code == '0' && inputs.create_pr == true }}
        run: |
          uv run --no-config python -m app.data.resort_acquisition.generate_catalog_patch \
            --artifacts-dir artifacts/catalog-acquisition

      - name: Validate patched catalog
        if: ${{ steps.acquisition.outputs.exit_code == '0' && inputs.create_pr == true }}
        run: uv run --no-config python -m app.data.validate_resort_catalog

      - name: Run focused patch tests
        if: ${{ steps.acquisition.outputs.exit_code == '0' && inputs.create_pr == true }}
        run: uv run --no-config pytest tests/test_loader.py tests/test_resort_acquisition.py -q

      - name: Create draft catalog patch PR
        if: ${{ steps.acquisition.outputs.exit_code == '0' && inputs.create_pr == true }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- app/data/resorts.json app/data/resort_acquisition/sources.json; then
            echo "No catalog changes to publish."
            exit 0
          fi

          branch="catalog-acquisition/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add app/data/resorts.json app/data/resort_acquisition/sources.json
          git commit -m "chore: apply catalog acquisition proposals"
          git push --set-upstream origin "$branch"

          {
            echo "Conservative catalog acquisition proposals were applied for review."
            echo
            echo "The full evidence packet is available in the catalog-acquisition workflow artifact."
            echo
            if [ -f artifacts/catalog-acquisition/patch-review.md ]; then
              cat artifacts/catalog-acquisition/patch-review.md
            fi
          } > /tmp/catalog-acquisition-pr-body.md

          gh pr create \
            --draft \
            --title "Review catalog acquisition proposals" \
            --body-file /tmp/catalog-acquisition-pr-body.md \
            --head "$branch"

      - name: Upload acquisition artifacts
        if: ${{ always() && steps.acquisition.outputs.exit_code != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: catalog-acquisition
          path: artifacts/catalog-acquisition
          if-no-files-found: error

      - name: Fail when acquisition failed
        if: ${{ steps.acquisition.outputs.exit_code != '0' }}
        run: exit "${{ steps.acquisition.outputs.exit_code }}"
