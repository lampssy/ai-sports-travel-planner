name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FLY_APP: snowcast
      BASE_URL: https://snowcast.fly.dev

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        run: flyctl deploy --remote-only --app "$FLY_APP"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke check web app
        run: curl --fail --silent --show-error "$BASE_URL/"

      - name: Smoke check healthz
        run: curl --fail --silent --show-error "$BASE_URL/api/healthz"

      - name: Smoke check readyz
        run: curl --fail --silent --show-error "$BASE_URL/api/readyz"

      - name: Smoke check representative search
        run: >
          curl --fail --silent --show-error
          "$BASE_URL/api/search?location=France&min_price=150&max_price=320&stars=1&skill_level=intermediate"
